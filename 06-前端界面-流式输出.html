<!DOCTYPE html>
<html>
<head>
    <title>AI问答</title>
    <style>
        #chat { border:1px solid #ccc; height:400px; overflow-y:scroll; padding:10px; }
        .user { text-align:right; color:blue; }
        .ai { text-align:left; color:green; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input id="input" type="text" placeholder="问点什么..." />
    <button id="send">发送</button>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        async function ask(prompt) {
            // 显示用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'user';
            userMsg.innerText = '我：' + prompt;
            chatDiv.appendChild(userMsg);

            // AI消息占位
            const aiMsg = document.createElement('div');
            aiMsg.className = 'ai';
            aiMsg.innerText = 'AI：';
            chatDiv.appendChild(aiMsg);

            const response = await fetch('http://localhost:5001/chat-stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (let line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        fullText += data;
                        aiMsg.innerText = 'AI：' + fullText;
                        chatDiv.scrollTop = chatDiv.scrollHeight;
                    }
                }
            }
        }

        sendBtn.onclick = () => {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            ask(text);
        };
    </script>
</body>
</html>
