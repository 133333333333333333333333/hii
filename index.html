<!DOCTYPE html>
<html>
<head>
  <!-- 中文不乱码 -->
  <meta charset="UTF-8">
    <title>AI问答</title>
    <style>
        #chat { border:1px solid #ccc; height:400px; overflow-y:scroll; padding:10px; }
        .user { text-align:right; color:blue; }
        .ai { text-align:left; color:green; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input id="input" type="text" placeholder="问点什么..." />
    <button id="send">发送</button>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

async function ask(message) {
    const userMsg = document.createElement('div');
    userMsg.className = 'user';
    userMsg.innerText = '我：' + message;
    chatDiv.appendChild(userMsg);

    const aiMsg = document.createElement('div');
    aiMsg.className = 'ai';
    aiMsg.innerText = 'AI：';
    chatDiv.appendChild(aiMsg);

    const response = await fetch('/chat-stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })   // 字段名改为 message
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
            if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') return;
                try {
                    const json = JSON.parse(data);
                    if (json.content) {
                        fullText += json.content;
                        aiMsg.innerText = 'AI：' + fullText;
                        chatDiv.scrollTop = chatDiv.scrollHeight;
                    }
                } catch (e) {
                    console.error('解析错误', data);
                }
            }
        }
    }
}
        sendBtn.onclick = () => {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            ask(text);
        };
    </script>
</body>
</html>
